name: Release — npm publish

# Publishes to npm when a version tag (e.g. v0.2.0) is pushed.
# Requires an NPM_TOKEN repository secret (Automation token) with publish rights.
# Provenance ties the published package to this workflow run; it needs a public
# repo and id-token: write.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Smoke tests (both installers)
        run: node test/run-tests.mjs
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ($PKG_VERSION)" >&2
            exit 1
          fi
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
